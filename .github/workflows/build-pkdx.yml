name: Build pkdx binaries

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
            binary: pkdx-darwin-arm64
          - os: ubuntu-22.04
            target: linux-x86_64
            binary: pkdx-linux-x86_64
          - os: windows-2022
            target: windows-x86_64
            binary: pkdx-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install MoonBit (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$env:USERPROFILE\.moon\bin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Install BLAS (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev liblapack-dev

      - name: Build
        working-directory: pkdx
        env:
          # Linux requires OpenBLAS/LAPACK instead of macOS Accelerate.
          # Windows is not supported for nash/select/meta-divergence; the
          # upstream BLAS FFI stub currently assumes macOS or Linux. CI
          # continues to attempt a native build on Windows as a best-effort,
          # and the downstream feature-gate in `bin/pkdx.cmd` hides the
          # unsupported subcommands on that platform.
          MOON_CC_LINK_FLAGS: ${{ runner.os == 'Linux' && '-lopenblas -llapack -lm' || '' }}
        run: |
          moon update
          moon build --target native src/main
        shell: bash

      - name: Copy binary (Unix)
        if: runner.os != 'Windows'
        run: cp pkdx/_build/native/debug/build/src/main/main.exe ${{ matrix.binary }}

      - name: Copy binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "pkdx\_build\native\debug\build\src\main\main.exe" "${{ matrix.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "pkdx ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/pkdx-darwin-arm64/pkdx-darwin-arm64 \
            artifacts/pkdx-linux-x86_64/pkdx-linux-x86_64 \
            artifacts/pkdx-windows-x86_64.exe/pkdx-windows-x86_64.exe
